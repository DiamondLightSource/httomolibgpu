name: httomolibgpu tests on Iris

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-linux:
    runs-on: iris-gpu
    container:
      image: nvidia/cuda:11.6.2-devel-ubi8
      env:
        NVIDIA_VISIBLE_DEVICES: ${{ env.NVIDIA_VISIBLE_DEVICES }}

    defaults:
      run:
        shell: bash -l {0}

    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4
        with:
          ref: "main"
          fetch-depth: 0

      - name: Create conda environment
        uses: mamba-org/setup-micromamba@v1
        with:
          environment-file: conda/environment.yml
          environment-name: httomo
          post-cleanup: 'all'
          init-shell: bash

      - name: Install httomolibgpu & coverage tools
        run: |
          micromamba install -y git mercurial
          pip install .[dev]
          pip install coverage
          micromamba list

      - name: Run tests
        run: |
          coverage run -m pytest tests/
          coverage xml -o /home/runner/coverage.xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: /home/runner/coverage.xml
          fail_ci_if_error: true
          verbose: true
